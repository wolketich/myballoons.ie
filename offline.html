<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>You're Offline | MyBalloons Dublin</title>
  <meta name="robots" content="noindex,nofollow">
  <style>
    :root {
      --pistachio: #C5626A;
      --ivory: #F7F5F0;
      --charcoal: #2C2320;
      --charcoal-light: #5C4E49;
      --font-display: 'Cormorant Garamond', Georgia, serif;
      --font-body: 'Jost', system-ui, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-body);
      background: var(--ivory);
      color: var(--charcoal);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .emoji { font-size: 4rem; margin-bottom: 1.5rem; animation: float 3s ease-in-out infinite; }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    h1 {
      font-family: var(--font-display);
      font-size: clamp(2rem, 6vw, 3rem);
      font-weight: 300;
      margin-bottom: 1rem;
      color: var(--charcoal);
    }
    p {
      font-size: 1rem;
      color: var(--charcoal-light);
      line-height: 1.75;
      max-width: 420px;
      margin: 0 auto 2rem;
    }
    .actions { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }
    .btn {
      display: inline-block;
      padding: 0.75rem 1.75rem;
      border-radius: 50px;
      font-family: var(--font-body);
      font-size: 0.9rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .btn--primary { background: var(--rose); color: #fff; border: 1.5px solid var(--rose); }
    .btn--primary:hover { opacity: 0.85; }
    .btn--outline { background: transparent; color: var(--charcoal); border: 1.5px solid var(--charcoal); }
    .btn--outline:hover { background: var(--charcoal); color: #fff; }
    .contact-info { margin-top: 2.5rem; padding-top: 2rem; border-top: 1px solid #EAE5DA; }
    .contact-info p { font-size: 0.9rem; margin-bottom: 0.75rem; }
    .contact-info a { color: var(--rose); font-weight: 500; text-decoration: none; }
    .logo {
      position: fixed;
      top: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      font-family: var(--font-display);
      font-size: 1.5rem;
      color: var(--charcoal);
    }
    .logo span { color: var(--rose); }
  </style>
  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#C5626A">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="MyBalloons">
  <link rel="apple-touch-icon" href="images/icons/icon-192.png">
  <link rel="apple-touch-icon" sizes="152x152" href="images/icons/icon-152.png">
  <link rel="icon" type="image/png" sizes="192x192" href="images/icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="32x32" href="images/icons/icon-96.png">
</head>
<body class="nav-solid">
  <div class="logo">My<span>Balloons</span></div>

  <div class="emoji">🎈</div>
  <h1>You're Offline</h1>
  <p>It looks like you've lost your internet connection. Don't worry — once you're back online, we'll be here waiting to create something beautiful for you.</p>

  <div class="actions">
    <button class="btn btn--primary" onclick="window.location.reload()">Try Again</button>
    <a href="/" class="btn btn--outline">Go Home</a>
  </div>

  <div class="contact-info">
    <p>Need to reach us urgently? WhatsApp works without a strong signal:</p>
    <a href="https://wa.me/353851140753">085 114 0753</a> &nbsp;·&nbsp;
    <a href="https://wa.me/353894714339">089 471 4339</a>
  </div>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('[SW] Registered:', reg.scope))
          .catch(err => console.warn('[SW] Failed:', err));
      });
    }
  </script>
</body>
</html>
